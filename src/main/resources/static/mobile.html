<!DOCTYPE html>
<html lang="sr-Latn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avlija - Grupni Račun</title>
    <style>
        body { font-family: sans-serif; padding: 12px; background: #f9f9f9; margin: 0; }
        /* ── MOBILE UI ──────────────────────────────────────────── */
        .m-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        }

        }

        .m-total-box {

        .modal-btn {

        /* ── SCAN ───────────────────────────────────────────────── */

<body>


<!-- CAMERA OVERLAY -->
<div class="camera-overlay" id="cameraOverlay">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <canvas id="cameraCanvas" style="display:none"></canvas>

    <div class="cam-success-bar" id="camSuccessBar" onclick="captureNext()"></div>
    <div class="cam-status-bar" id="camStatusBar">Čitam račun...</div>

    <div id="camDebugBox" style="display:none;position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,0.92);color:#0f0;font-family:monospace;font-size:13px;padding:10px;word-break:break-all;max-height:50vh;overflow-y:auto;z-index:9999;"></div>

    <div class="camera-controls">
        <button class="btn-cam-close" onclick="closeCamera()">✕ Zatvori</button>
        <button class="btn-capture" id="captureBtn" onclick="captureFrame()">📷</button>
        <div style="width:70px"></div>
    </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmOverlay">
    <div class="modal-box">
        <div class="modal-icon">🗑</div>
        <div class="modal-message" id="confirmMessage"></div>
        <div class="modal-actions">
            <button class="modal-btn-cancel" onclick="closeConfirm(false)">Odustani</button>
            <button class="modal-btn-danger" onclick="closeConfirm(true)">Obriši</button>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-icon" id="modalIcon">⚠️</div>
        <div class="modal-message" id="modalMessage"></div>
        <div class="modal-actions">
            <button class="modal-btn" onclick="closeModal()">U redu</button>
        </div>
    </div>
</div>

<div id="mobileUI">
    <div class="m-header">
        <h2>Grupni Račun: <span id="mInvoiceNumber">—</span></h2>
    </div>

    <!-- Hidden inputs still used by mAddBill logic -->
    <input type="hidden" id="mTargetDate">
    <input type="hidden" id="mWaiterId">

    <div class="m-date-row" id="mScannedInfo" style="display:none;background:#f0f4ff;border-radius:8px;padding:10px;margin-bottom:8px;font-size:15px;">
        <div>📅 <strong id="mScannedDate">—</strong> &nbsp;&nbsp; 👤 Konobar: <strong id="mScannedWaiter">—</strong></div>
    </div>

    <div class="m-input-row">
        <input type="number" id="mBillInput" placeholder="broj računa"
               onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();mAddBill();}">
        <button class="btn-add" onclick="mAddBill()">+</button>
        <button class="btn-scan" id="scanBtn" onclick="startScan()" title="Skeniraj račun">📷</button>
    </div>

    <div class="m-tags" id="mBillTags">
        <span style="color:#aaa;font-size:13px;">Nema odabranih računa</span>
    </div>

    <div class="m-error" id="mError"></div>
    <div class="m-success" id="mSuccess"></div>

    <div class="m-total-box" id="mTotalBox" style="display:none;">
        <div class="m-total-label">Ukupno</div>
        <div class="m-total-value" id="mTotalValue">0.00</div>
    </div>

    <div class="m-actions">
        <button class="m-btn-save" id="mSaveBtn" onclick="mSave()" style="display:none;">💾 Sačuvaj</button>
        <button class="m-btn-novo" onclick="mNovo()">+ Novi račun</button>
    </div>
</div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ── MOBILE UI ──────────────────────────────────────────────
    let mBillNumbers = [];   // display only
    let mBillEntries = [];   // [{id, waiterId, number}]
    let mTotal = 0;
    let mSaved = false;

    function mShowError(msg) {
        const el = document.getElementById('mError');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('mSuccess').style.display = 'none';
    }
    function mClearMessages() {
        document.getElementById('mError').style.display = 'none';
        document.getElementById('mSuccess').style.display = 'none';
    }

    function mOnDateChange() { }  // date now comes from scan

    async function mNovo() {
        mBillNumbers = []; mBillEntries = []; mTotal = 0; mSaved = false;
        mRenderTags();
        document.getElementById('mTotalBox').style.display = 'none';
        document.getElementById('mScannedInfo').style.display = 'none';
        document.getElementById('mTargetDate').value = '';
        document.getElementById('mWaiterId').value = '';
        const sb = document.getElementById('mSaveBtn');
        sb.style.display = 'none'; sb.disabled = false;
        sb.textContent = '💾 Sačuvaj'; sb.style.background = '#6a1b9a';
        document.getElementById('mInvoiceNumber').textContent = '—';
        mClearMessages();
    }

    async function mAddBill() {
        const input = document.getElementById('mBillInput');
        const val = input.value.trim();
        if (!val || isNaN(val)) return;
        const num = parseInt(val);
        const date = document.getElementById('mTargetDate').value;
        const waiterId = document.getElementById('mWaiterId').value.trim();
        if (!waiterId) {
            mShowError('Skenirajte račun da biste učitali datum i konobara.');
            return { ok: false, msg: 'Skenirajte račun da biste učitali datum i konobara.' };
        }
        if (mBillEntries.some(e => e.number === num)) {
            const msg = `Račun ${num} je već dodan.`;
            mShowError(msg);
            input.value = ''; input.focus();
            return { ok: false, msg };
        }
        const params = new URLSearchParams();
        params.append('target_date', date);
        params.append('waiter_id', waiterId);
        params.append('bill_numbers', num);
        try {
            const valRes = await fetch(`${API_BASE}/bills/validate?${params}`);
            const valData = await valRes.json();
            if (valData.missing.length > 0) {
                mShowError(`Račun ${num} nije pronađen za ${fmtDate(date)} konobar ${waiterId}.`);
                input.value = ''; input.focus();
                return { ok: false, msg: `Račun ${num} nije pronađen za ${fmtDate(date)} konobar ${waiterId}.` };
            } else {
                const linkRes = await fetch(`${API_BASE}/bills/check-linked?target_date=${date}&waiter_id=${waiterId}&bill_number=${num}`);
                const linkData = await linkRes.json();
                if (linkData.invoice_number !== null) {
                    const msg = `Račun ${num} je već u grupnom računu ${linkData.invoice_number} za datum ${fmtDate(date)}.`;
                    mShowError(msg);
                    input.value = ''; input.focus();
                    return { ok: false, msg };
                } else {
                    const resolveRes = await fetch(`${API_BASE}/bills/resolve?target_date=${date}&waiter_id=${waiterId}&bill_number=${num}`);
                    const resolveData = await resolveRes.json();
                    mBillEntries.push({ id: resolveData.id, waiterId: parseInt(waiterId), number: num });
                    mBillNumbers.push(num);
                    mClearMessages();
                    mRenderTags();
                    await mRefreshTotal();
                    // Update invoice number preview on first bill
                    if (mBillEntries.length === 1) {
                        try {
                            const invRes = await fetch(`${API_BASE}/invoice/next-number?target_date=${date}`);
                            const invData = await invRes.json();
                            document.getElementById('mInvoiceNumber').textContent = `#${invData.number}`;
                        } catch(e) {}
                    }
                    input.value = ''; input.focus();
                    return { ok: true };
                }
            }
        } catch(e) {
            mShowError('Greška pri konekciji na API.');
            input.value = ''; input.focus();
            return { ok: false, msg: 'Greška pri konekciji na API.' };
        }
    }

    async function mRemoveBill(num) {
        mBillNumbers = mBillNumbers.filter(n => n !== num);
        mBillEntries = mBillEntries.filter(e => e.number !== num);
        mRenderTags();
        await mRefreshTotal();
    }

    function mRenderTags() {
        const c = document.getElementById('mBillTags');
        c.innerHTML = '';
        if (mBillEntries.length === 0) {
            c.innerHTML = '<span style="color:#aaa;font-size:13px;">Nema odabranih računa</span>';
            return;
        }
        mBillEntries.forEach(e => {
            const tag = document.createElement('div');
            tag.className = 'm-tag';
            tag.innerHTML = `${e.number}<small style="opacity:.7"> k${e.waiterId}</small> <span class="remove" onclick="mRemoveBill(${e.number})">×</span>`;
            c.appendChild(tag);
        });
    }

    async function mRefreshTotal() {
        document.getElementById('mTotalBox').style.display = 'none';
        document.getElementById('mSaveBtn').style.display = 'none';
        if (mBillEntries.length === 0) return;
        const params = new URLSearchParams();
        mBillEntries.forEach(e => params.append('bill_ids', e.id));
        try {
            const res = await fetch(`${API_BASE}/bills/summary-by-ids?${params}`);
            const data = await res.json();
            mTotal = data.reduce((sum, r) => sum + Number(r.total), 0);
            document.getElementById('mTotalValue').textContent = formatNum(mTotal);
            document.getElementById('mTotalBox').style.display = 'block';
            document.getElementById('mSaveBtn').style.display = 'block';
        } catch(e) {}
    }

    async function mSave() {
        if (mSaved) return;
        const date = document.getElementById('mTargetDate').value;
        const btn = document.getElementById('mSaveBtn');
        btn.disabled = true; btn.textContent = '...';
        try {
            const params = new URLSearchParams();
            params.append('target_date', date);
            params.append('total', mTotal);
            mBillEntries.forEach(e => params.append('bill_ids', e.id));
            const res = await fetch(`${API_BASE}/invoice/save-by-ids?${params}`, { method: 'POST' });
            const data = await res.json();
            document.getElementById('mInvoiceNumber').textContent = `#${data.number}`;
            btn.textContent = '✔ Sačuvano'; btn.style.background = '#2e7d32';
            mSaved = true;
            const s = document.getElementById('mSuccess');
            s.textContent = `✔ Grupni račun #${data.number} sačuvan.`;
            s.style.display = 'block';
        } catch(e) { btn.disabled = false; btn.textContent = '💾 Sačuvaj'; mShowError('Greška pri snimanju.'); }
    }

    // Sync date inputs between desktop and mobile
    document.getElementById('mTargetDate').addEventListener('change', function() {
        // sync to desktop if loaded together (not needed in standalone mobile)
        if (document.getElementById('targetDate')) document.getElementById('targetDate').value = this.value;
    });



    // ── SCAN / OCR ─────────────────────────────────────────────

    let cameraStream  = null;
    let scanAttempt   = 0;  // attempts for current bill, reset on success or close

    async function startScan() {
        const overlay    = document.getElementById('cameraOverlay');
        const video      = document.getElementById('cameraVideo');
        const success    = document.getElementById('camSuccessBar');
        const status     = document.getElementById('camStatusBar');
        const captureBtn = document.getElementById('captureBtn');

        success.classList.remove('visible');
        status.style.background = 'rgba(0,0,0,0.7)';
        status.textContent = 'Pokrećem kameru...';
        status.classList.add('visible');
        captureBtn.disabled = true;
        overlay.classList.add('visible');
        scanAttempt = 0;

        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            video.srcObject = cameraStream;
            video.play();

            // Poll until video has real dimensions — works on all mobile browsers
            await new Promise((resolve) => {
                const check = setInterval(() => {
                    if (video.videoWidth > 0 && video.videoHeight > 0) {
                        clearInterval(check);
                        resolve();
                    }
                }, 100);
                // Absolute timeout fallback after 8 seconds
                setTimeout(() => { clearInterval(check); resolve(); }, 8000);
            });

            status.classList.remove('visible');
            captureBtn.disabled = false;
        } catch (err) {
            overlay.classList.remove('visible');
            mShowError('Kamera nije dostupna: ' + err.message);
        }
    }

    function closeCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
            cameraStream = null;
        }
        scanAttempt = 0;
        document.getElementById('cameraOverlay').classList.remove('visible');
    }

    function captureNext() {
        document.getElementById('camSuccessBar').classList.remove('visible');
        document.getElementById('captureBtn').disabled = false;
    }

    function showScanError(msg) {
        const success = document.getElementById('camSuccessBar');
        const captureBtn = document.getElementById('captureBtn');
        success.style.background = '#c62828';
        success.textContent = '✕ ' + msg;
        success.classList.add('visible');
        setTimeout(() => {
            success.classList.remove('visible');
            success.style.background = '#2e7d32';
        }, 4000);
        captureBtn.disabled = false;
    }

    function handleAddResult(result, billNum) {
        const success    = document.getElementById('camSuccessBar');
        const captureBtn = document.getElementById('captureBtn');
        if (result && result.ok) {
            success.style.background = '#2e7d32';
            success.textContent = '✔ Račun #' + billNum + ' dodan — skeniraj sledeći';
            success.classList.add('visible');
            setTimeout(() => success.classList.remove('visible'), 2500);
            captureBtn.disabled = false;
        } else {
            showScanError((result && result.msg) ? result.msg : 'Račun nije dodan.');
        }
    }

    function dbg(msg) {
        const box = document.getElementById('camDebugBox');
        box.style.display = 'block';
        box.style.display = 'block';
        const line = document.createElement('div');
        line.style.borderBottom = '1px solid #333';
        line.style.padding = '2px 0';
        line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
        box.appendChild(line);
        box.scrollTop = box.scrollHeight;
    }

    async function captureFrame() {
        const video      = document.getElementById('cameraVideo');
        const canvas     = document.getElementById('cameraCanvas');
        const status     = document.getElementById('camStatusBar');
        const success    = document.getElementById('camSuccessBar');
        const captureBtn = document.getElementById('captureBtn');

        // Clear debug box for new scan
        const box = document.getElementById('camDebugBox');
        box.innerHTML = '';
        box.style.display = 'block';
        dbg('=== TAP DETECTED ===');

        captureBtn.disabled = true;
        success.classList.remove('visible');
        status.style.background = 'rgba(0,0,0,0.7)';
        status.textContent = '📷 Snimam...';
        status.classList.add('visible');

        dbg('video ' + video.videoWidth + 'x' + video.videoHeight);

        if (!video.videoWidth || !video.videoHeight) {
            dbg('ERROR: video not ready');
            status.textContent = '✕ Kamera nije spremna';
            status.style.background = 'rgba(180,0,0,0.8)';
            captureBtn.disabled = false;
            return;
        }

        // Resize to 800px wide
        const MAX_W = 800;
        const scale = Math.min(1, MAX_W / video.videoWidth);
        canvas.width  = Math.round(video.videoWidth  * scale);
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
        dbg('canvas ' + canvas.width + 'x' + canvas.height + ' base64 ' + base64.length + ' chars');

        status.textContent = '🌐 Šaljem Claude...';

        try {
            dbg('fetch START /ocr/scan');
            const res = await fetch(`${API_BASE}/ocr/scan`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64 })
            });

            dbg('HTTP ' + res.status + ' ' + res.statusText);
            status.textContent = '🔍 Obrađujem...';

            const data = await res.json();
            dbg('JSON: ' + JSON.stringify(data).substring(0, 300));

            if (data.error) {
                throw new Error(data.error);
            }

            const text = data.text.trim();
            dbg('text: [' + text + ']');
            status.classList.remove('visible');

            // Parse pipe-separated response: billNum|total|date|waiterId
            const parts    = text.split('|').map(p => p.trim());
            const billStr   = parts[0] || 'NULL';
            const totalStr  = parts[1] || 'NULL';
            const dateStr   = parts[2] || 'NULL';  // DD.MM.YYYY
            const waiterStr = parts[3] || 'NULL';

            const billNum  = /^\d+$/.test(billStr) ? parseInt(billStr) : null;
            const waiterNum = /^\d+$/.test(waiterStr) ? parseInt(waiterStr) : null;

            // Parse date DD.MM.YYYY → YYYY-MM-DD
            let scanDate = null;
            if (dateStr !== 'NULL' && /^\d{2}\.\d{2}\.\d{4}$/.test(dateStr)) {
                const [dd, mm, yyyy] = dateStr.split('.');
                scanDate = `${yyyy}-${mm}-${dd}`;
            }

            // Parse total — handle both US (10,800.00) and European (10.800,00) formats
            const totalClean = (() => {
                const lastComma = totalStr.lastIndexOf(',');
                const lastDot   = totalStr.lastIndexOf('.');
                if (lastComma > lastDot && /,\d{2}$/.test(totalStr)) {
                    return totalStr.substring(0, lastComma).replace(/[.,]/g, '') + '.' + totalStr.substring(lastComma + 1);
                }
                return totalStr.replace(/,/g, '');
            })();
            const scanTotal = /^[\d.]+$/.test(totalClean) ? parseFloat(totalClean) : null;

            dbg('bill=' + billNum + ' total=' + scanTotal + ' date=' + scanDate + ' waiter=' + waiterNum);

            // Validate all required fields scanned
            const missing = [];
            if (!billNum)  missing.push('broj računa');
            if (!scanDate) missing.push('datum');
            if (!waiterNum) missing.push('konobar ID');

            if (missing.length > 0) {
                scanAttempt++;
                if (scanAttempt >= 3) {
                    scanAttempt = 0;
                    showScanError('Nije moguće pročitati: ' + missing.join(', ') + '. Pokušajte ponovo.');
                } else {
                    status.style.background = 'rgba(150,80,0,0.8)';
                    status.textContent = '⚠ Nedostaje: ' + missing.join(', ') + ' (' + scanAttempt + '/3)';
                    status.classList.add('visible');
                    setTimeout(() => { status.classList.remove('visible'); captureBtn.disabled = false; }, 2000);
                }
                return;
            }

            // All fields found — populate hidden inputs and info display
            document.getElementById('mTargetDate').value = scanDate;
            document.getElementById('mWaiterId').value   = waiterNum;
            document.getElementById('mScannedDate').textContent   = dateStr;
            document.getElementById('mScannedWaiter').textContent = waiterNum;
            document.getElementById('mScannedInfo').style.display = 'block';

            // We have a bill number — verify total against DB
            const date     = scanDate;
            const waiterId = String(waiterNum);
            const totalRes  = await fetch(`${API_BASE}/bills/total?target_date=${date}&waiter_id=${waiterId}&bill_number=${billNum}`);
            const totalData = await totalRes.json();
            const dbTotal   = totalData.total !== null ? parseFloat(totalData.total) : null;
            dbg('dbTotal=' + dbTotal);

            if (dbTotal === null) {
                // Bill not in DB — let mAddBill handle the error message
                scanAttempt = 0;
                document.getElementById('mBillInput').value = billNum;
                const result = await mAddBill();
                box.style.display = 'none';
                handleAddResult(result, billNum);
                return;
            }

            // Compare totals (round to 2 decimals to avoid float issues)
            const totalsMatch = scanTotal === null ||
                Math.abs(Math.round(scanTotal * 100) - Math.round(dbTotal * 100)) <= 1;

            if (!totalsMatch) {
                scanAttempt++;
                dbg('total mismatch scan=' + scanTotal + ' db=' + dbTotal + ' attempt=' + scanAttempt);
                if (scanAttempt >= 3) {
                    scanAttempt = 0;
                    showScanError('Iznos ne odgovara (skenirano: ' + scanTotal + ', u bazi: ' + dbTotal + '). Unesite ručno.');
                } else {
                    status.style.background = 'rgba(150,80,0,0.8)';
                    status.textContent = '⚠ Iznos ne odgovara ' + scanTotal + '≠' + dbTotal + ' (' + scanAttempt + '/3) — ponovi';
                    status.classList.add('visible');
                    setTimeout(() => { status.classList.remove('visible'); captureBtn.disabled = false; }, 2500);
                }
                return;
            }

            // All good — add the bill
            scanAttempt = 0;
            document.getElementById('mBillInput').value = billNum;
            const result = await mAddBill();
            box.style.display = 'none';
            handleAddResult(result, billNum);

        } catch (err) {
            dbg('CATCH: ' + err.message);
            status.style.background = 'rgba(180,0,0,0.8)';
            status.textContent = '✕ ' + err.message;
            status.classList.add('visible');
            captureBtn.disabled = false;
        }
    }


    async function loadMaxDate() {
        try {
            const res = await fetch(`${API_BASE}/bills/max-date`);
            const data = await res.json();
            if (data.max_date) {
                const d = data.max_date.split('T')[0];
                document.getElementById('mTargetDate').value = d;
            }
        } catch (err) {
            document.getElementById('mTargetDate').value = new Date().toISOString().split('T')[0];
        }
        await mNovo();
    }

    loadMaxDate();
</script>
