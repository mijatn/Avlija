<!DOCTYPE html>
<html lang="sr-Latn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avlija - Skener</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; padding: 12px; background: #f9f9f9; margin: 0; }

        .m-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .m-header h2 { font-size: 20px; margin: 0; color: #1565c0; flex: 1; }
        .m-header .btn-desktop {
            padding: 8px 14px;
            font-size: 13px;
            background: #666;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }
        .m-header .btn-desktop:hover { background: #444; }

        .m-scanned-info {
            display: none;
            background: #f0f4ff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 14px;
            font-size: 15px;
        }
        .m-scanned-info strong { color: #1565c0; }

        .m-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 50px;
            background: white;
            border: 2px solid #1565c0;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        .m-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #e8f0fe;
            border: 1px solid #a8c4f0;
            color: #2a5db0;
            font-size: 15px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 20px;
        }
        .m-tag .remove {
            font-size: 18px;
            cursor: pointer;
            color: #888;
            line-height: 1;
            padding: 0 4px;
        }
        .m-tag .remove:hover { color: #c00; }
        .m-tags-empty { color: #aaa; font-size: 13px; }

        .m-total-box {
            background: white;
            border: 2px solid #1565c0;
            border-radius: 12px;
            padding: 18px 20px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .m-total-label { font-size: 13px; color: #666; margin-bottom: 4px; }
        .m-total-value { font-size: 36px; font-weight: bold; color: #1565c0; }

        .m-actions { display: flex; flex-direction: column; gap: 10px; }
        .m-btn-scan {
            padding: 16px;
            font-size: 18px;
            background: #00796b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .m-btn-scan:hover { background: #00695c; }
        .m-btn-scan:disabled { background: #aaa; cursor: not-allowed; }

        .m-btn-save {
            padding: 14px;
            font-size: 16px;
            background: #6a1b9a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            display: none;
        }
        .m-btn-save:hover { background: #4a148c; }
        .m-btn-save:disabled { background: #2e7d32; cursor: not-allowed; }

        .m-btn-novo {
            padding: 14px;
            font-size: 16px;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .m-btn-novo:hover { background: #0d47a1; }

        .m-error { color: #c62828; font-size: 13px; margin-bottom: 10px; display: none; font-weight: bold; }
        .m-success { color: #2e7d32; font-size: 13px; margin-bottom: 10px; display: none; font-weight: bold; }

        /* CAMERA OVERLAY */
        .camera-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }
        .camera-overlay.visible { display: flex; }

        #cameraVideo {
            flex: 1;
            width: 100%;
            object-fit: cover;
        }

        .camera-controls {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 16px 20px;
            background: #111;
            gap: 12px;
        }

        .btn-capture {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: white;
            border: 5px solid #aaa;
            cursor: pointer;
            font-size: 28px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-capture:active { background: #ddd; }
        .btn-capture:disabled { background: #666; cursor: not-allowed; }

        .btn-cam-close {
            padding: 12px 18px;
            background: #c62828;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-cam-close:hover { background: #b71c1c; }

        .cam-status-bar {
            display: none;
            position: absolute;
            bottom: 110px;
            left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 15px;
            font-weight: bold;
            z-index: 9999;
        }
        .cam-status-bar.visible { display: block; }

        .cam-success-bar {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0;
            background: #2e7d32;
            color: white;
            text-align: center;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            animation: slidein 0.3s ease;
            z-index: 9999;
        }
        .cam-success-bar.visible { display: block; }
        @keyframes slidein { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.25);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 24px 28px;
            max-width: 380px;
            width: 90%;
        }
        .modal-icon { font-size: 22px; margin-bottom: 10px; }
        .modal-message { font-size: 14px; color: #333; line-height: 1.5; margin-bottom: 20px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn {
            padding: 8px 20px; font-size: 14px; border: none;
            border-radius: 6px; cursor: pointer; background: #1565c0;
            color: white; font-weight: bold;
        }
        .modal-btn:hover { background: #0d47a1; }
        .modal-btn-cancel {
            padding: 8px 20px; font-size: 14px; border: 1px solid #ccc;
            border-radius: 6px; cursor: pointer; background: white;
            color: #555; font-weight: bold;
        }
        .modal-btn-cancel:hover { background: #f5f5f5; }
    </style>
</head>
<body>

<!-- CAMERA OVERLAY -->
<div class="camera-overlay" id="cameraOverlay">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <canvas id="cameraCanvas" style="display:none"></canvas>
    <div class="cam-success-bar" id="camSuccessBar" onclick="captureNext()"></div>
    <div class="cam-status-bar" id="camStatusBar">Čitam račun...</div>
    <div class="camera-controls">
        <button class="btn-cam-close" onclick="closeCamera()">✕ Zatvori</button>
        <button class="btn-capture" id="captureBtn" onclick="captureFrame()">📷</button>
        <div style="width:70px"></div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-icon" id="modalIcon">⚠️</div>
        <div class="modal-message" id="modalMessage"></div>
        <div class="modal-actions">
            <button class="modal-btn" onclick="closeModal()">U redu</button>
        </div>
    </div>
</div>

<div class="m-header">
    <h2>📱 Skener računa</h2>
    <button class="btn-desktop" onclick="goToDesktop()">💻 Desktop</button>
</div>

<div class="m-scanned-info" id="mScannedInfo">
    <div>📅 <strong id="mScannedDate">—</strong> &nbsp;&nbsp; 👤 Konobar: <strong id="mScannedWaiter">—</strong></div>
</div>

<div class="m-error" id="mError"></div>
<div class="m-success" id="mSuccess"></div>

<div class="m-tags" id="mBillTags">
    <span class="m-tags-empty">Nema skeniranih računa</span>
</div>

<div class="m-total-box" id="mTotalBox">
    <div class="m-total-label">Ukupno</div>
    <div class="m-total-value" id="mTotalValue">0.00</div>
</div>

<div class="m-actions">
    <button class="m-btn-scan" id="scanBtn" onclick="startScan()">📷 Skeniraj račun</button>
    <button class="m-btn-save" id="mSaveBtn" onclick="mSave()">💾 Sačuvaj grupni račun</button>
    <button class="m-btn-novo" onclick="mNovo()">+ Novi račun</button>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script src="invoice.js"></script>
<script>
    // ── MOBILE SCANNER UI ──────────────────────────────────────────

    let mBillEntries = [];  // [{id, waiterId, number}]
    let mTotal = 0;
    let mSaved = false;
    let mTargetDate = '';
    let mWaiterId = '';

    function mShowError(msg) {
        const el = document.getElementById('mError');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('mSuccess').style.display = 'none';
    }

    function mClearMessages() {
        document.getElementById('mError').style.display = 'none';
        document.getElementById('mSuccess').style.display = 'none';
    }

    function mNovo() {
        mBillEntries = []; mTotal = 0; mSaved = false;
        mTargetDate = ''; mWaiterId = '';
        mRenderTags();
        document.getElementById('mTotalBox').style.display = 'none';
        document.getElementById('mScannedInfo').style.display = 'none';
        const sb = document.getElementById('mSaveBtn');
        sb.style.display = 'none'; sb.disabled = false;
        sb.textContent = '💾 Sačuvaj grupni račun'; sb.style.background = '#6a1b9a';
        mClearMessages();
    }

    async function mAddBill(billNum, date, waiterId) {
        if (mBillEntries.some(e => e.number === billNum)) {
            return { ok: false, msg: `Račun ${billNum} je već dodan.` };
        }

        const params = new URLSearchParams();
        params.append('target_date', date);
        params.append('waiter_id', waiterId);
        params.append('bill_numbers', billNum);

        try {
            const valRes = await fetch(`${API_BASE}/bills/validate?${params}`);
            const valData = await valRes.json();
            if (valData.missing.length > 0) {
                return { ok: false, msg: `Račun ${billNum} nije pronađen za ${fmtDate(date)} konobar ${waiterId}.` };
            }

            const linkRes = await fetch(`${API_BASE}/bills/check-linked?target_date=${date}&waiter_id=${waiterId}&bill_number=${billNum}`);
            const linkData = await linkRes.json();
            if (linkData.invoice_number !== null) {
                return { ok: false, msg: `Račun ${billNum} je već u grupnom računu ${linkData.invoice_number} za datum ${fmtDate(date)}.` };
            }

            const resolveRes = await fetch(`${API_BASE}/bills/resolve?target_date=${date}&waiter_id=${waiterId}&bill_number=${billNum}`);
            const resolveData = await resolveRes.json();
            mBillEntries.push({ id: resolveData.id, waiterId: parseInt(waiterId), number: billNum });
            mClearMessages();
            mRenderTags();
            await mRefreshTotal();

            return { ok: true };
        } catch(e) {
            return { ok: false, msg: 'Greška pri konekciji na API.' };
        }
    }

    async function mRemoveBill(num) {
        mBillEntries = mBillEntries.filter(e => e.number !== num);
        mRenderTags();
        await mRefreshTotal();
    }

    function mRenderTags() {
        const c = document.getElementById('mBillTags');
        c.innerHTML = '';
        if (mBillEntries.length === 0) {
            c.innerHTML = '<span class="m-tags-empty">Nema skeniranih računa</span>';
            return;
        }
        mBillEntries.forEach(e => {
            const tag = document.createElement('div');
            tag.className = 'm-tag';
            tag.innerHTML = `${e.number}<small style="opacity:.7"> k${e.waiterId}</small> <span class="remove" onclick="mRemoveBill(${e.number})">×</span>`;
            c.appendChild(tag);
        });
    }

    async function mRefreshTotal() {
        document.getElementById('mTotalBox').style.display = 'none';
        document.getElementById('mSaveBtn').style.display = 'none';
        if (mBillEntries.length === 0) return;

        const params = new URLSearchParams();
        mBillEntries.forEach(e => params.append('bill_ids', e.id));
        try {
            const res = await fetch(`${API_BASE}/bills/summary-by-ids?${params}`);
            const data = await res.json();
            mTotal = data.reduce((sum, r) => sum + Number(r.total), 0);
            document.getElementById('mTotalValue').textContent = formatNum(mTotal);
            document.getElementById('mTotalBox').style.display = 'block';
            document.getElementById('mSaveBtn').style.display = 'block';
        } catch(e) {}
    }

    async function mSave() {
        if (mSaved) return;
        if (!mTargetDate || !mWaiterId) {
            mShowError('Skenirajte račun prvo.');
            return;
        }
        const btn = document.getElementById('mSaveBtn');
        btn.disabled = true; btn.textContent = '...';
        try {
            const params = new URLSearchParams();
            params.append('target_date', mTargetDate);
            params.append('total', mTotal);
            mBillEntries.forEach(e => params.append('bill_ids', e.id));
            const res = await fetch(`${API_BASE}/invoice/save-by-ids?${params}`, { method: 'POST' });
            const data = await res.json();
            btn.textContent = '✔ Sačuvano'; btn.style.background = '#2e7d32';
            mSaved = true;
            const s = document.getElementById('mSuccess');
            s.textContent = `✔ Grupni račun #${data.number} sačuvan!`;
            s.style.display = 'block';
        } catch(e) {
            btn.disabled = false; btn.textContent = '💾 Sačuvaj grupni račun';
            mShowError('Greška pri snimanju.');
        }
    }

    function showModal(msg, icon = '⚠️') {
        document.getElementById('modalIcon').textContent = icon;
        document.getElementById('modalMessage').textContent = msg;
        document.getElementById('modalOverlay').classList.add('visible');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('visible');
    }

    function goToDesktop() {
        window.location.href = window.location.origin + '/desktop.html';
    }

    // ── CAMERA SCANNING ────────────────────────────────────────────

    let cameraStream = null;
    let scanAttempt = 0;

    async function startScan() {
        const overlay = document.getElementById('cameraOverlay');
        const video = document.getElementById('cameraVideo');
        const status = document.getElementById('camStatusBar');
        const captureBtn = document.getElementById('captureBtn');

        status.textContent = 'Pokrećem kameru...';
        status.classList.add('visible');
        captureBtn.disabled = true;
        overlay.classList.add('visible');
        scanAttempt = 0;

        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            video.srcObject = cameraStream;
            video.play();

            await new Promise((resolve) => {
                const check = setInterval(() => {
                    if (video.videoWidth > 0 && video.videoHeight > 0) {
                        clearInterval(check);
                        resolve();
                    }
                }, 100);
                setTimeout(() => { clearInterval(check); resolve(); }, 8000);
            });

            status.classList.remove('visible');
            captureBtn.disabled = false;
        } catch (err) {
            overlay.classList.remove('visible');
            mShowError('Kamera nije dostupna: ' + err.message);
        }
    }

    function closeCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
            cameraStream = null;
        }
        scanAttempt = 0;
        document.getElementById('cameraOverlay').classList.remove('visible');
    }

    function captureNext() {
        document.getElementById('camSuccessBar').classList.remove('visible');
        document.getElementById('captureBtn').disabled = false;
    }

    function showScanError(msg) {
        const success = document.getElementById('camSuccessBar');
        const captureBtn = document.getElementById('captureBtn');
        success.style.background = '#c62828';
        success.textContent = '✕ ' + msg;
        success.classList.add('visible');
        setTimeout(() => {
            success.classList.remove('visible');
            success.style.background = '#2e7d32';
        }, 4000);
        captureBtn.disabled = false;
    }

    function handleAddResult(result, billNum) {
        const success = document.getElementById('camSuccessBar');
        const captureBtn = document.getElementById('captureBtn');
        if (result && result.ok) {
            success.style.background = '#2e7d32';
            success.textContent = '✔ Račun #' + billNum + ' dodan — skeniraj sledeći';
            success.classList.add('visible');
            setTimeout(() => success.classList.remove('visible'), 2500);
            captureBtn.disabled = false;
        } else {
            showScanError((result && result.msg) ? result.msg : 'Račun nije dodan.');
        }
    }

    async function captureFrame() {
        const video = document.getElementById('cameraVideo');
        const canvas = document.getElementById('cameraCanvas');
        const status = document.getElementById('camStatusBar');
        const success = document.getElementById('camSuccessBar');
        const captureBtn = document.getElementById('captureBtn');

        captureBtn.disabled = true;
        success.classList.remove('visible');
        status.textContent = '📷 Snimam...';
        status.classList.add('visible');

        if (!video.videoWidth || !video.videoHeight) {
            status.textContent = '✕ Kamera nije spremna';
            status.style.background = 'rgba(180,0,0,0.8)';
            captureBtn.disabled = false;
            return;
        }

        const MAX_W = 800;
        const scale = Math.min(1, MAX_W / video.videoWidth);
        canvas.width = Math.round(video.videoWidth * scale);
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

        status.textContent = '🌐 Šaljem Claude...';

        try {
            const res = await fetch(`${API_BASE}/ocr/scan`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64 })
            });

            status.textContent = '🔍 Obrađujem...';
            const data = await res.json();

            if (data.error) throw new Error(data.error);

            const text = data.text.trim();
            status.classList.remove('visible');

            // Parse: billNum|total|date|waiterId
            const parts = text.split('|').map(p => p.trim());
            const billNum = /^\d+$/.test(parts[0]) ? parseInt(parts[0]) : null;
            const waiterNum = /^\d+$/.test(parts[3]) ? parseInt(parts[3]) : null;

            let scanDate = null;
            if (parts[2] && /^\d{2}\.\d{2}\.\d{4}$/.test(parts[2])) {
                const [dd, mm, yyyy] = parts[2].split('.');
                scanDate = `${yyyy}-${mm}-${dd}`;
            }

            const missing = [];
            if (!billNum) missing.push('broj računa');
            if (!scanDate) missing.push('datum');
            if (!waiterNum) missing.push('konobar ID');

            if (missing.length > 0) {
                scanAttempt++;
                if (scanAttempt >= 3) {
                    scanAttempt = 0;
                    showScanError('Nije moguće pročitati: ' + missing.join(', '));
                } else {
                    status.style.background = 'rgba(150,80,0,0.8)';
                    status.textContent = '⚠ Nedostaje: ' + missing.join(', ') + ' (' + scanAttempt + '/3)';
                    status.classList.add('visible');
                    setTimeout(() => { status.classList.remove('visible'); captureBtn.disabled = false; }, 2000);
                }
                return;
            }

            // Update global date/waiter from first scan
            if (!mTargetDate) {
                mTargetDate = scanDate;
                mWaiterId = String(waiterNum);
                document.getElementById('mScannedDate').textContent = parts[2];
                document.getElementById('mScannedWaiter').textContent = waiterNum;
                document.getElementById('mScannedInfo').style.display = 'block';
            }

            // Add bill
            scanAttempt = 0;
            const result = await mAddBill(billNum, scanDate, String(waiterNum));
            handleAddResult(result, billNum);

        } catch (err) {
            status.style.background = 'rgba(180,0,0,0.8)';
            status.textContent = '✕ ' + err.message;
            status.classList.add('visible');
            captureBtn.disabled = false;
        }
    }

    // Init
    mNovo();
</script>
</body>
</html>
